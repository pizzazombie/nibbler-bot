services:
  bot:
    build:
      context: .
    container_name: nibbler-bot
    network_mode: ${DOCKER_NETWORK_MODE:-bridge}
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ACCESS_PASSWORD: ${ACCESS_PASSWORD}
      TIMEZONE: ${TIMEZONE:-Europe/Madrid}
      DATABASE_PATH: ${DATABASE_PATH:-/data/nibbler-bot.db}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
      OPENAI_REASONING_EFFORT: ${OPENAI_REASONING_EFFORT:-low}
      OPENAI_MAX_OUTPUT_TOKENS: ${OPENAI_MAX_OUTPUT_TOKENS:-800}
      OPENAI_REQUEST_TIMEOUT_SECONDS: ${OPENAI_REQUEST_TIMEOUT_SECONDS:-60}
      OPENAI_PRICE_INPUT_PER_1M_USD: ${OPENAI_PRICE_INPUT_PER_1M_USD:-0.75}
      OPENAI_PRICE_CACHED_INPUT_PER_1M_USD: ${OPENAI_PRICE_CACHED_INPUT_PER_1M_USD:-0.08}
      OPENAI_PRICE_OUTPUT_PER_1M_USD: ${OPENAI_PRICE_OUTPUT_PER_1M_USD:-4.50}
      DEFAULT_DAILY_CALORIE_LIMIT: ${DEFAULT_DAILY_CALORIE_LIMIT:-1800}
      DAILY_GENERATION_LIMIT: ${DAILY_GENERATION_LIMIT:-100}
      WEEKLY_SUMMARY_HOUR: ${WEEKLY_SUMMARY_HOUR:-9}
      WEEKLY_SUMMARY_MINUTE: ${WEEKLY_SUMMARY_MINUTE:-0}
      MONTHLY_SUMMARY_HOUR: ${MONTHLY_SUMMARY_HOUR:-9}
      MONTHLY_SUMMARY_MINUTE: ${MONTHLY_SUMMARY_MINUTE:-5}
      ADMIN_CHAT_IDS: ${ADMIN_CHAT_IDS:-}
    volumes:
      - nibbler_bot_data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  nibbler_bot_data:
